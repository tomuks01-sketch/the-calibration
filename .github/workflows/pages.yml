name: Deploy dashboard to GitHub Pages

# Publishes the static dashboard in web/ to GitHub Pages on every push to main
# and after the scheduled data refresh commits a new snapshot.

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Refresh data snapshot"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
