name: Refresh data snapshot

# Keeps web/data.json fresh without a live server. Runs on a schedule,
# regenerates the snapshot from public read-only APIs, commits if changed.

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes (UTC)
  workflow_dispatch: {}       # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate snapshot
        run: python src/generate_snapshot.py
        env:
          # Optional Tier B context. Card-free provider (Groq default, or any
          # OpenAI-compatible e.g. OpenRouter). Absent key => Tier A only.
          # Accept either secret name (no rename needed by the user).
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.GROQCLOUD_API_KEY }}
          LLM_API_BASE: ${{ vars.LLM_API_BASE }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}

      - name: Validate JSON before commit
        run: |
          set -euo pipefail
          python -c "import json; json.load(open('web/data.json'))"
          python -c "import json,glob,sys; [json.load(open(f)) for f in ['web/ledger.json','web/scoreboard.json']+glob.glob('web/ledger-archive/*.json')]"
          python -c "import json,os; (json.load(open('web/features.json')) if os.path.exists('web/features.json') else None)"
          python -c "import json,os; [json.load(open(f)) for f in ['web/crypto_ledger.json','web/crypto_scoreboard.json','web/stocks.json'] if os.path.exists(f)]"
          echo "JSON OK"

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.json web/ledger.json web/scoreboard.json web/ledger-archive web/features.json
          # Crypto-forecast artifacts (cfx-v1) — optional: added only if present
          # so a fail-open crypto skip never blocks the core snapshot commit.
          if [ -f web/crypto_ledger.json ]; then git add web/crypto_ledger.json; fi
          if [ -f web/crypto_scoreboard.json ]; then git add web/crypto_scoreboard.json; fi
          if [ -d web/crypto-ledger-archive ]; then git add web/crypto-ledger-archive; fi
          if [ -f web/stocks.json ]; then git add web/stocks.json; fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh snapshot + ledger"
            # Plain rebase, NO -X strategy: a conflict on the append-only
            # ledger must FAIL loudly (job errors), never auto-resolve and
            # silently drop entries from a concurrent run. Collisions are
            # already rare (concurrency group serialises scheduled runs).
            git pull --rebase origin main
            git push
          else
            echo "No change — nothing to commit."
          fi
