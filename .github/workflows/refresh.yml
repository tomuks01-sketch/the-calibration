name: Refresh data snapshot

# Keeps web/data.json fresh without a live server. Runs on a schedule,
# regenerates the snapshot from public read-only APIs, commits if changed.

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes (UTC)
  workflow_dispatch: {}       # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate snapshot
        run: python src/generate_snapshot.py
        env:
          # Optional Tier B context. Card-free provider (Groq default, or any
          # OpenAI-compatible e.g. OpenRouter). Absent key => Tier A only.
          # Accept either secret name (no rename needed by the user).
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.GROQCLOUD_API_KEY }}
          LLM_API_BASE: ${{ vars.LLM_API_BASE }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}

      - name: Validate JSON before commit
        run: |
          python -c "import json; json.load(open('web/data.json'))"
          python -c "import json,glob,sys; [json.load(open(f)) for f in ['web/ledger.json','web/scoreboard.json']+glob.glob('web/ledger-archive/*.json')]"
          echo "JSON OK"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data.json web/ledger.json web/scoreboard.json web/ledger-archive
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh snapshot + ledger"
            # Fail loud on rebase conflict — never silently overwrite the
            # append-only ledger of a concurrent run.
            git pull --rebase -X theirs origin main
            git push
          else
            echo "No change — nothing to commit."
          fi
